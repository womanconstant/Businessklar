<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A1628">
  <title>BusinessKlar</title>
  <style>
    :root { --navy: #0A1628; --gold: #C9A84C; --text: #F0EDE6; --muted: #8899BB; --border: rgba(201,168,76,.25); --red: #E85555; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; }
    .sat-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; border-bottom: 1px solid var(--border); background: rgba(10,22,40,.95); }
    .sat-nav .logo { font-family: Fraunces, Georgia, serif; font-size: 18px; font-weight: 700; color: var(--gold); text-decoration: none; }
    .sat-nav .logo span { color: var(--text); font-weight: 300; }
    .sat-nav .links { display: flex; gap: 8px; flex-wrap: wrap; }
    .sat-nav a.nav-btn { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); text-decoration: none; }
    .sat-nav a.nav-btn:hover { border-color: var(--gold); color: var(--gold); }
    .sat-nav a.nav-btn.active { border-color: var(--gold); color: var(--gold); }
    .wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px 48px; }
    h1 { font-size: 1.45rem; color: var(--gold); margin-bottom: 10px; }
    .lead { color: var(--muted); font-size: 14px; margin-bottom: 22px; line-height: 1.5; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(18,32,64,.85); color: var(--text); font-size: 14px; margin-bottom: 14px; font-family: inherit; }
    textarea { min-height: 120px; resize: vertical; }
    button { padding: 12px 22px; background: var(--gold); color: var(--navy); font-weight: 600; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    button:hover:not(:disabled) { filter: brightness(1.05); }
    .note { font-size: 12px; color: var(--muted); margin-top: 16px; }
    #msg { margin-top: 14px; font-size: 14px; display: none; line-height: 1.45; }
    #msg.err { color: var(--red); display: block; }
    #msg.ok { color: #8c8; display: block; }
  </style>
</head>
<body>
  <header class="sat-nav">
    <a class="logo" href="index.html">Business<span>Klar</span></a>
    <div class="links">
      <a class="nav-btn" id="nav-home" href="index.html">Home</a>
      <a class="nav-btn" id="nav-spec" href="specialists-home.html">Specialists</a>
      <a class="nav-btn active" id="nav-contact" href="contact.html">Contact</a>
      <a class="nav-btn" id="nav-dash" href="dashboard.html">Account</a>
    </div>
  </header>
  <div class="wrap">
    <h1 id="page-h1">—</h1>
    <p class="lead" id="page-lead">—</p>
    <form id="f" novalidate>
      <label for="topic" id="lbl-topic">—</label>
      <select id="topic" name="topic" required>
        <option value="" id="opt-0">—</option>
        <option value="product" id="opt-calc">—</option>
        <option value="account" id="opt-acc">—</option>
        <option value="specialists" id="opt-spec">—</option>
        <option value="partnership" id="opt-part">—</option>
        <option value="other" id="opt-other">—</option>
      </select>
      <label for="email" id="lbl-email">—</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
      <label for="body" id="lbl-body">—</label>
      <textarea id="body" name="body" required placeholder=""></textarea>
      <button type="submit" id="btn-submit">—</button>
    </form>
    <p id="msg"></p>
    <p class="note" id="page-note">—</p>
  </div>
  <script src="satellite-i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="bk-auth.js"></script>
  <script>
  var SUPABASE_URL = 'https://gdrvgziuldcrsiqliklu.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkcnZneml1bGRjcnNpcWxpa2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzk2MTUsImV4cCI6MjA4Nzk1NTYxNX0.I2GZlUDEZWZzEUKr41_AkngCja36cPihgMvLEDGIMjU';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
  });
  if (typeof BK_AUTH !== 'undefined') {
    BK_AUTH.initAuthLayer(sb);
    function renderAuthUI() {
      /* Навигация contact без отдельного auth-бейджа; слушатель для будущей синхронизации с bk:auth-change. */
    }
    window.addEventListener(BK_AUTH.EVENT_NAME, renderAuthUI);
  }
  window.BK_SAT.init();
  var T = window.BK_SAT.t.bind(window.BK_SAT);
  function esc(s) { return String(s || '').replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
  document.getElementById('nav-home').href = window.BK_SAT.withLang('index.html');
  document.getElementById('nav-spec').href = window.BK_SAT.withLang('specialists-home.html');
  document.getElementById('nav-contact').href = window.BK_SAT.withLang('contact.html');
  document.getElementById('nav-dash').href = window.BK_SAT.withLang('dashboard.html');
  document.getElementById('nav-home').textContent = T('nav_home');
  document.getElementById('nav-spec').textContent = T('nav_specialists');
  document.getElementById('nav-contact').textContent = T('nav_contact');
  document.getElementById('nav-dash').textContent = T('nav_dashboard');
  document.title = T('contact_title') + ' — BusinessKlar';
  document.documentElement.lang = window.BK_SAT.getLang();
  document.getElementById('page-h1').textContent = T('contact_title');
  document.getElementById('page-lead').textContent = T('contact_lead');
  document.getElementById('lbl-topic').textContent = T('contact_topic');
  document.getElementById('opt-0').textContent = T('contact_topic_0');
  document.getElementById('opt-calc').textContent = T('contact_calc');
  document.getElementById('opt-acc').textContent = T('contact_account');
  document.getElementById('opt-spec').textContent = T('contact_spec');
  document.getElementById('opt-part').textContent = T('contact_partner');
  document.getElementById('opt-other').textContent = T('contact_other');
  document.getElementById('lbl-email').textContent = T('contact_your_email');
  document.getElementById('lbl-body').textContent = T('contact_message');
  document.getElementById('body').placeholder = T('contact_body_ph');
  document.getElementById('btn-submit').textContent = T('contact_submit');
  document.getElementById('page-note').textContent = T('contact_note');

  var _sendLock = false;
  document.getElementById('f').addEventListener('submit', async function (e) {
    e.preventDefault();
    var msg = document.getElementById('msg');
    msg.className = '';
    msg.style.display = 'none';
    var topic = document.getElementById('topic').value.trim();
    var email = document.getElementById('email').value.trim();
    var body = document.getElementById('body').value.trim();
    if (!topic || !email || !body) {
      msg.className = 'err';
      msg.style.display = 'block';
      msg.textContent = T('contact_fill');
      return;
    }
    if (_sendLock) return;
    _sendLock = true;
    var btn = document.getElementById('btn-submit');
    var prev = btn.textContent;
    btn.disabled = true;
    btn.textContent = T('contact_sending');
    var uid = null;
    try {
      var ures = await sb.auth.getUser();
      uid = ures.data && ures.data.user ? ures.data.user.id : null;
    } catch (e) {}
    var row = {
      topic: topic,
      email: email,
      message: body,
      user_id: uid,
      status: 'new',
      lang: window.BK_SAT.getLang(),
      source_page: 'contact.html'
    };
    try {
      var ins = await sb.from('support_requests').insert([row]).select();
      if (ins.error) {
        msg.className = 'err';
        msg.style.display = 'block';
        msg.textContent = T('contact_err') + (ins.error.message ? ' (' + esc(ins.error.message) + ')' : '');
        return;
      }
      msg.className = 'ok';
      msg.style.display = 'block';
      msg.textContent = T('support_success_message_sent');
      document.getElementById('f').reset();
    } catch (ex) {
      msg.className = 'err';
      msg.style.display = 'block';
      msg.textContent = T('contact_err') + (ex && ex.message ? ' (' + esc(ex.message) + ')' : '');
    } finally {
      _sendLock = false;
      btn.disabled = false;
      btn.textContent = prev;
    }
  });
  </script>
</body>
</html>
