<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A1628">
  <title>BusinessKlar</title>
  <style>
    :root { --navy: #0A1628; --gold: #C9A84C; --text: #F0EDE6; --muted: #8899BB; --border: rgba(201,168,76,.25); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .top { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .top a { color: var(--gold); font-size: 14px; text-decoration: none; }
    h1 { font-size: 1rem; color: var(--gold); }
    #msgs { flex: 1; overflow-y: auto; padding: 16px; max-width: 640px; width: 100%; margin: 0 auto; }
    .bubble { max-width: 85%; padding: 10px 14px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; line-height: 1.45; word-break: break-word; }
    .bubble.me { background: linear-gradient(145deg, rgba(201,168,76,.25), rgba(201,168,76,.08)); margin-left: auto; border: 1px solid rgba(201,168,76,.45); color: var(--text); }
    .bubble.them { background: rgba(12, 24, 48, .9); border: 1px solid var(--border); margin-right: auto; color: var(--text); }
    .bubble .meta { font-size: 10px; color: var(--muted); margin-top: 6px; opacity: .9; }
    .composer { padding: 16px; border-top: 1px solid var(--border); max-width: 640px; width: 100%; margin: 0 auto; }
    .composer textarea { width: 100%; min-height: 72px; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: rgba(18,32,64,.85); color: var(--text); font-family: inherit; font-size: 14px; margin-bottom: 10px; }
    .composer button { padding: 10px 18px; border-radius: 10px; border: none; background: var(--gold); color: var(--navy); font-weight: 600; cursor: pointer; margin-right: 8px; font-family: inherit; }
    .composer .btn-ghost { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .composer .danger { background: transparent; color: #e88; border: 1px solid rgba(232,136,136,.4); }
    #err { padding: 12px 16px; color: #e88; font-size: 14px; }
  </style>
</head>
<body>
  <div class="top">
    <a id="link-inbox" href="inbox.html">←</a>
    <h1 id="hdr">—</h1>
    <button type="button" class="btn-ghost" id="btn-refresh" style="padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(18,32,64,.6);color:var(--gold);cursor:pointer;font-size:12px;font-family:inherit">—</button>
  </div>
  <div id="err"></div>
  <div id="msgs"></div>
  <div class="composer" id="composer" style="display:none">
    <textarea id="txt" placeholder=""></textarea>
    <button type="button" id="send">—</button>
    <button type="button" class="danger" id="hide">—</button>
  </div>
  <script src="satellite-i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  window.BK_SAT.init();
  var T = window.BK_SAT.t.bind(window.BK_SAT);
  var SUPABASE_URL = 'https://gdrvgziuldcrsiqliklu.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkcnZneml1bGRjcnNpcWxpa2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzk2MTUsImV4cCI6MjA4Nzk1NTYxNX0.I2GZlUDEZWZzEUKr41_AkngCja36cPihgMvLEDGIMjU';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  document.title = T('conv_title') + ' — BusinessKlar';

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function loc() {
    var m = { de: 'de-DE', en: 'en-GB', ru: 'ru-RU', uk: 'uk-UA', pl: 'pl-PL', ro: 'ro-RO', tr: 'tr-TR', es: 'es-ES' };
    return m[window.BK_SAT.getLang()] || 'en-GB';
  }

  var convId = new URLSearchParams(window.location.search).get('id');
  var pollTimer = null;
  var lastSendAt = 0;
  var sendInFlight = false;
  var MIN_SEND_MS = 1200;

  document.getElementById('link-inbox').href = window.BK_SAT.withLang('inbox.html');
  document.getElementById('link-inbox').textContent = T('conv_back');
  document.getElementById('btn-refresh').textContent = T('conv_refresh');
  document.getElementById('txt').placeholder = T('conv_placeholder');
  document.getElementById('send').textContent = T('conv_send');
  document.getElementById('hide').textContent = T('conv_hide');

  async function loadMessages(scrollBottom) {
    var u = (await sb.auth.getUser()).data.user;
    if (!u || !convId) return;
    var q = await sb.from('conversation_messages').select('*').eq('conversation_id', convId).order('created_at', { ascending: true });
    var el = document.getElementById('msgs');
    if (q.error) {
      el.innerHTML = '<p style="padding:16px;color:#e88">' + esc(T('conv_no_access')) + '</p>';
      return;
    }
    var rows = q.data || [];
    var oldLen = parseInt(el.dataset.len || '0', 10);
    el.innerHTML = rows.map(function (m) {
      var mine = m.sender_user_id === u.id;
      return '<div class="bubble ' + (mine ? 'me' : 'them') + '">' + esc(m.body) +
        '<div class="meta">' + (mine ? esc(T('conv_you')) : esc(T('conv_them'))) + ' · ' + esc(new Date(m.created_at).toLocaleString(loc())) + '</div></div>';
    }).join('');
    el.dataset.len = String(rows.length);
    if (scrollBottom || rows.length > oldLen) {
      requestAnimationFrame(function () {
        el.scrollTop = el.scrollHeight;
      });
    }
  }

  (async function () {
    var u = (await sb.auth.getUser()).data.user;
    if (!u || !convId) {
      document.getElementById('err').textContent = T('conv_need_login');
      return;
    }
    var cv = await sb.from('conversations').select('id, consultant_id, client_user_id').eq('id', convId).maybeSingle();
    if (cv.error || !cv.data) {
      document.getElementById('err').textContent = T('conv_not_found');
      return;
    }
    var co = await sb.from('consultants').select('company_name').eq('id', cv.data.consultant_id).maybeSingle();
    document.getElementById('hdr').textContent = co.data && co.data.company_name ? co.data.company_name : T('conv_title');
    document.getElementById('composer').style.display = 'block';
    await loadMessages(true);

    document.getElementById('btn-refresh').onclick = function () { loadMessages(true); };

    pollTimer = setInterval(function () {
      loadMessages(false);
    }, 4000);

    document.getElementById('send').onclick = async function () {
      var tx = document.getElementById('txt').value.trim();
      if (!tx) return;
      var now = Date.now();
      if (sendInFlight || now - lastSendAt < MIN_SEND_MS) return;
      sendInFlight = true;
      var btn = document.getElementById('send');
      if (btn) btn.disabled = true;
      try {
        var ins = await sb.from('conversation_messages').insert({
          conversation_id: convId,
          sender_user_id: u.id,
          body: tx
        });
        if (ins.error) {
          alert(ins.error.message || T('conv_send'));
          return;
        }
        lastSendAt = Date.now();
        document.getElementById('txt').value = '';
        await loadMessages(true);
      } finally {
        sendInFlight = false;
        if (btn) btn.disabled = false;
      }
    };

    document.getElementById('hide').onclick = async function () {
      if (!confirm(T('conv_hide_confirm'))) return;
      if (pollTimer) clearInterval(pollTimer);
      var up = await sb.from('conversation_participants')
        .update({ deleted_at: new Date().toISOString() })
        .eq('conversation_id', convId)
        .eq('user_id', u.id);
      if (up.error) {
        alert(up.error.message || '—');
        return;
      }
      window.location.href = window.BK_SAT.withLang('inbox.html');
    };
  })();
  </script>
</body>
</html>
