<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A1628">
  <title>Shared Business Case – BusinessKlar</title>
  <meta name="description" content="View a shared BusinessKlar business setup report with registration steps, compliance guidance and specialist context.">
  <link rel="canonical" href="https://businessklar.de/share.html">
  <meta property="og:title" content="Shared Business Case – BusinessKlar">
  <meta property="og:description" content="View a shared BusinessKlar business setup report with registration steps, compliance guidance and specialist context.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://businessklar.de/share.html">
  <meta property="og:site_name" content="BusinessKlar">
  <meta property="og:image" content="https://businessklar.de/og-image.png">
  <meta property="og:image:alt" content="BusinessKlar – business setup guidance for Germany">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Shared Business Case – BusinessKlar">
  <meta name="twitter:description" content="View a shared BusinessKlar business setup report with registration steps, compliance guidance and specialist context.">
  <meta name="twitter:image" content="https://businessklar.de/og-image.png">
  <style>
    :root { --navy: #0A1628; --gold: #C9A84C; --text: #F0EDE6; --muted: #8899BB; --border: rgba(201, 168, 76, 0.2); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, 'Segoe UI', sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; padding: 24px 16px 48px; }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 8px; color: var(--gold); }
    p.err { color: #E85555; font-size: 14px; margin-top: 16px; }
    .card { margin-top: 20px; padding: 18px; border: 1px solid var(--border); border-radius: 12px; background: rgba(18, 32, 64, 0.6); }
    .row { margin-bottom: 12px; font-size: 14px; }
    .row strong { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
    .cta { display: inline-block; margin-top: 28px; padding: 12px 20px; background: var(--gold); color: var(--navy); font-weight: 600; text-decoration: none; border-radius: 12px; font-size: 14px; }
    .cta:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="h1">—</h1>
    <div id="content">—</div>
  </div>

  <script src="satellite-i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  window.BK_SAT.init();
  var T = window.BK_SAT.t.bind(window.BK_SAT);
  var SUPABASE_URL = 'https://gdrvgziuldcrsiqliklu.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkcnZneml1bGRjcnNpcWxpa2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzk2MTUsImV4cCI6MjA4Nzk1NTYxNX0.I2GZlUDEZWZzEUKr41_AkngCja36cPihgMvLEDGIMjU';
  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  document.getElementById('h1').textContent = T('share_title');
  document.title = T('share_title') + ' — BusinessKlar';
  document.getElementById('content').textContent = T('share_loading');

  function esc(s) {
    if (s == null || s === '') return '—';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function run() {
    var el = document.getElementById('content');
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    if (params.get('lang')) try { localStorage.setItem('bk_lang', window.BK_SAT.norm(params.get('lang'))); } catch (e) {}
    if (!token) {
      el.innerHTML = '<p class="err">' + esc(T('share_err_token')) + '</p>';
      return;
    }
    var q = await supabase.rpc('get_shared_case_by_token', { p_token: token });
    if (q.error || !q.data) {
      el.innerHTML = '<p class="err">' + esc(T('share_err_load')) + '</p>';
      return;
    }
    var d = q.data;
    var ctaHref = window.BK_SAT.withLang('index.html');
    el.innerHTML =
      '<div class="card">' +
      '<div class="row"><strong>' + esc(T('share_lf')) + '</strong>' + esc(d.legal_form) + '</div>' +
      '<div class="row"><strong>' + esc(T('share_act')) + '</strong>' + esc(d.activity_text) + '</div>' +
      '<div class="row"><strong>' + esc(T('share_city')) + '</strong>' + esc(d.city_name) + '</div>' +
      '<div class="row"><strong>' + esc(T('share_r1')) + '</strong>' + esc(d.revenue_y1) + '</div>' +
      '<div class="row"><strong>' + esc(T('share_exp')) + '</strong>' + esc(d.expenses_monthly) + '</div>' +
      '</div>' +
      '<a class="cta" href="' + String(ctaHref).replace(/"/g, '&quot;') + '">' + esc(T('share_cta')) + '</a>';
  }
  run();
  </script>
</body>
</html>
