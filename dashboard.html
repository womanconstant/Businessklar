<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A1628">
  <title>Dashboard – BusinessKlar</title>
  <meta name="description" content="View and manage your saved BusinessKlar business setup cases, reports and next steps.">
  <link rel="canonical" href="https://businessklar.de/dashboard.html">
  <meta property="og:title" content="Dashboard – BusinessKlar">
  <meta property="og:description" content="View and manage your saved BusinessKlar business setup cases, reports and next steps.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://businessklar.de/dashboard.html">
  <meta property="og:site_name" content="BusinessKlar">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Dashboard – BusinessKlar">
  <meta name="twitter:description" content="View and manage your saved BusinessKlar business setup cases, reports and next steps.">
  <style>
    :root { --navy: #0A1628; --navy-mid: #122040; --gold: #C9A84C; --text: #F0EDE6; --muted: #8899BB; --border: rgba(201,168,76,.25); --red: #E85555; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; }
    .sat-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; border-bottom: 1px solid var(--border); background: rgba(10,22,40,.95); }
    .sat-nav .logo { font-family: Georgia, 'Times New Roman', serif; font-size: 18px; font-weight: 700; color: var(--gold); text-decoration: none; }
    .sat-nav .logo span { color: var(--text); font-weight: 300; }
    .sat-nav .links { display: flex; gap: 8px; flex-wrap: wrap; }
    .sat-nav a.nav-btn { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); text-decoration: none; }
    .sat-nav a.nav-btn:hover { border-color: var(--gold); color: var(--gold); }
    .sat-nav a.nav-btn.active { border-color: var(--gold); color: var(--gold); }
    .wrap { max-width: 900px; margin: 0 auto; padding: 28px 18px 48px; }
    h1 { font-size: 1.45rem; color: var(--gold); margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .empty { text-align: center; padding: 56px 24px; border: 1px dashed var(--border); border-radius: 20px; color: var(--muted); font-size: 15px; line-height: 1.6; background: rgba(18,32,64,.35); max-width: 480px; margin: 0 auto; }
    .empty .empty-icon { font-size: 42px; margin-bottom: 16px; opacity: .85; }
    .empty a { display: inline-block; margin-top: 18px; padding: 12px 22px; background: var(--gold); color: var(--navy); font-weight: 600; border-radius: 12px; text-decoration: none; font-size: 14px; }
    .card { border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; background: linear-gradient(145deg, rgba(18,32,64,.95), rgba(26,48,80,.35)); }
    .card h3 { font-size: 16px; margin-bottom: 6px; color: var(--cream, #F5EDD8); }
    .card .meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .card .status-pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.3); color: var(--gold); margin-bottom: 12px; }
    .row-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .row-btns a, .row-btns button { font-size: 12px; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(18,32,64,.8); color: var(--gold); text-decoration: none; cursor: pointer; font-family: inherit; }
    .row-btns a:hover, .row-btns button:hover { border-color: var(--gold); }
    .row-btns .danger { color: #E88; border-color: rgba(232,136,136,.4); }
    #gate { padding: 32px 20px; border: 1px solid var(--border); border-radius: 16px; text-align: center; background: rgba(18,32,64,.5); margin: 24px auto; max-width: 520px; }
    #gate p { color: var(--muted); font-size: 14px; margin-bottom: 16px; line-height: 1.5; }
    #gate a { display: inline-block; padding: 12px 22px; background: var(--gold); color: var(--navy); font-weight: 600; border-radius: 12px; text-decoration: none; }
    #share-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
    #share-overlay.open { display: flex; }
    #share-box { max-width: 420px; width: 100%; padding: 22px; border-radius: 16px; border: 1px solid var(--border); background: var(--navy); }
    #share-box p { font-size: 13px; color: var(--muted); margin-bottom: 10px; word-break: break-all; }
    #share-box .sb-btns { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    #share-box button { padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--gold); color: var(--navy); font-weight: 600; cursor: pointer; font-family: inherit; }
    #dash-loading { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 15px; }
    #dash-toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 3000; background: var(--navy-mid); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 12px; font-size: 14px; max-width: 90vw; }
    #dash-toast.open { display: block; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); z-index: 2500; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 24px; padding: 32px; width: 100%; max-width: 440px; position: relative; }
    .modal h3 { font-family: Georgia, serif; font-size: 1.25rem; color: var(--gold); margin-bottom: 8px; }
    .modal-fld { margin-bottom: 14px; }
    .modal-fld label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    .input-field { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(18,32,64,.85); color: var(--text); font-size: 14px; font-family: inherit; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 14px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .auth-tab { flex: 1; padding: 10px 12px; border: none; background: rgba(18,32,64,.6); color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit; }
    .auth-tab.active { background: rgba(201,168,76,.2); color: var(--gold); font-weight: 600; }
    .link-btn { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 13px; text-decoration: underline; font-family: inherit; padding: 0; }
    .btn-primary { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--gold); color: var(--navy); font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .btn-secondary { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-family: inherit; margin-top: 8px; }
    #auth-err { font-size: 13px; color: var(--red); margin-bottom: 10px; min-height: 1.2em; }
    #confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 2600; align-items: center; justify-content: center; padding: 16px; }
    #confirm-overlay.open { display: flex; }
    .confirm-box { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 16px; padding: 22px; max-width: 400px; width: 100%; }
    .confirm-box p { color: var(--muted); font-size: 14px; margin-bottom: 16px; line-height: 1.45; }
    .confirm-row { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
    .confirm-row button { padding: 10px 18px; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 13px; }
  </style>
</head>
<body>
  <header class="sat-nav">
    <a class="logo" href="index.html">Business<span>Klar</span></a>
    <div class="links">
      <a class="nav-btn" id="nav-home" href="index.html">Home</a>
      <a class="nav-btn" id="nav-spec" href="specialists-home.html">Specialists</a>
      <a class="nav-btn" id="nav-contact" href="contact.html">Contact</a>
      <a class="nav-btn active" id="nav-dash" href="dashboard.html">Account</a>
      <button type="button" class="nav-btn" id="nav-logout" style="display:none;cursor:pointer;font-family:inherit">—</button>
    </div>
  </header>

  <div id="dash-loading" class="wrap">…</div>

  <div id="gate" style="display:none" class="wrap">
    <div id="gate-inner"></div>
  </div>

  <div id="main" style="display:none" class="wrap">
    <h1 id="welcome">—</h1>
    <p class="sub" id="welcome-sub"></p>
    <div id="list"></div>
  </div>

  <div id="share-overlay" onclick="if(event.target===this)document.getElementById('share-overlay').classList.remove('open')">
    <div id="share-box" onclick="event.stopPropagation()">
      <h2 id="share-h2" style="font-size:1rem;color:var(--gold);margin-bottom:10px">—</h2>
      <p id="share-url"></p>
      <div class="sb-btns">
        <button type="button" id="share-copy">—</button>
        <button type="button" id="share-close" style="background:transparent;color:var(--text);border-color:var(--border)">—</button>
      </div>
    </div>
  </div>

  <div id="dash-toast" role="status"></div>

  <div id="confirm-overlay" onclick="if(event.target===this)document.getElementById('confirm-overlay').classList.remove('open')">
    <div class="confirm-box" onclick="event.stopPropagation()">
      <p id="confirm-text"></p>
      <div class="confirm-row">
        <button type="button" id="confirm-cancel" class="btn-secondary" style="margin-top:0;width:auto;border:1px solid var(--border)"></button>
        <button type="button" id="confirm-ok" style="margin-top:0;width:auto;background:var(--red);color:var(--text);border:none"></button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="auth-modal"
    onclick="if(event.target===this)document.getElementById('auth-modal').classList.add('hidden')">
    <div class="modal">
      <button type="button" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px"
        onclick="document.getElementById('auth-modal').classList.add('hidden')">&#10005;</button>
      <div class="auth-tabs" role="tablist">
        <button type="button" class="auth-tab active" id="auth-tab-login" role="tab">—</button>
        <button type="button" class="auth-tab" id="auth-tab-reg" role="tab">—</button>
      </div>
      <h3 id="el-login">—</h3>
      <p id="el-logd" style="font-size:13px;color:var(--muted);margin-bottom:12px">—</p>
      <p id="auth-forgot-hint" style="display:none;font-size:13px;color:var(--muted);margin-bottom:8px"></p>
      <p id="auth-err"></p>
      <div class="modal-fld"><label id="auth-email-label" for="auth-email">Email</label><input class="input-field" id="auth-email" type="email" autocomplete="email"></div>
      <div class="modal-fld" id="auth-pw-wrap"><label id="el-pw">—</label><input class="input-field" id="auth-password" type="password" autocomplete="current-password"></div>
      <p id="auth-forgot-wrap" style="margin:8px 0 0;font-size:13px">
        <button type="button" class="link-btn" id="auth-forgot-link">—</button>
        <button type="button" class="link-btn" id="auth-back-login" style="display:none;margin-left:12px">—</button>
      </p>
      <p id="auth-forgot-msg" style="font-size:13px;color:var(--muted);min-height:1.2em;margin-top:8px"></p>
      <button type="button" class="btn-primary" id="el-mbtn">—</button>
      <button type="button" class="btn-secondary" id="el-guest">—</button>
    </div>
  </div>

  <script src="satellite-i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="bk-auth.js"></script>
  <script>
  var SUPABASE_URL = 'https://gdrvgziuldcrsiqliklu.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkcnZneml1bGRjcnNpcWxpa2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzk2MTUsImV4cCI6MjA4Nzk1NTYxNX0.I2GZlUDEZWZzEUKr41_AkngCja36cPihgMvLEDGIMjU';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
  });
  if (typeof BK_AUTH !== 'undefined') {
    BK_AUTH.initAuthLayer(sb);
  }
  var T = function (k) { return window.BK_SAT.t(k); };

  var PW_LBL = { de: 'Passwort', en: 'Password', ru: 'Пароль', uk: 'Пароль', pl: 'Hasło', ro: 'Parolă', tr: 'Şifre', es: 'Contraseña' };

  function dashToast(msg) {
    var t = document.getElementById('dash-toast');
    if (!t) return;
    t.textContent = msg || '';
    t.classList.add('open');
    clearTimeout(dashToast._tm);
    dashToast._tm = setTimeout(function () { t.classList.remove('open'); }, 2600);
  }

  function confirmDialog(message, onOk) {
    var ov = document.getElementById('confirm-overlay');
    var tx = document.getElementById('confirm-text');
    if (tx) tx.textContent = message;
    document.getElementById('confirm-cancel').textContent = T('dash_confirm_del_cancel');
    document.getElementById('confirm-ok').textContent = T('dash_confirm_del_ok');
    document.getElementById('confirm-cancel').onclick = function () { ov.classList.remove('open'); };
    document.getElementById('confirm-ok').onclick = function () {
      ov.classList.remove('open');
      if (typeof onOk === 'function') onOk();
    };
    ov.classList.add('open');
  }

  function localeFmt() {
    var m = { de: 'de-DE', en: 'en-GB', ru: 'ru-RU', uk: 'uk-UA', pl: 'pl-PL', ro: 'ro-RO', tr: 'tr-TR', es: 'es-ES' };
    return m[window.BK_SAT.getLang()] || 'en-GB';
  }

  function shareUrlClean(token) {
    var base = new URL('share.html?token=' + encodeURIComponent(token), window.location.href).href;
    var u = new URL(base);
    u.searchParams.set('lang', window.BK_SAT.getLang());
    return u.href;
  }

  function caseTitle(row) {
    var rd = row.result_data;
    if (rd && rd.report_title) return rd.report_title;
    if (row.activity_text) return row.activity_text;
    if (row.legal_form) return row.legal_form;
    return T('dash_case_default');
  }

  function caseStatus(row) {
    var st = (row.status || '').toLowerCase();
    if (st === 'completed' || st === 'done') return T('dash_st_done');
    if (st === 'draft') return T('dash_st_draft');
    return T('dash_st_saved');
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      return new Date(iso).toLocaleString(localeFmt(), { dateStyle: 'short', timeStyle: 'short' });
    } catch (e) {
      return String(iso);
    }
  }

  async function ensureTokenForCase(caseId, uid) {
    var q = await sb.from('business_cases').select('id, share_token, profile_id').eq('id', caseId).eq('profile_id', uid).maybeSingle();
    if (q.error || !q.data) return null;
    if (q.data.share_token) return q.data.share_token;
    var token = crypto.randomUUID().replace(/-/g, '');
    var up = await sb.from('business_cases').update({ share_token: token, is_shared: true }).eq('id', caseId).eq('profile_id', uid);
    if (up.error) return null;
    return token;
  }

  function openShareDialog(url) {
    document.getElementById('share-url').textContent = url;
    document.getElementById('share-overlay').classList.add('open');
    document.getElementById('share-copy').onclick = function () {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function () { dashToast(T('dash_toast_copied')); }).catch(function () { prompt(T('dash_copy_prompt'), url); });
      } else {
        prompt(T('dash_copy_prompt'), url);
      }
    };
  }

  function sortCases(rows) {
    return rows.slice().sort(function (a, b) {
      var ua = a.updated_at ? Date.parse(a.updated_at) : NaN;
      var ub = b.updated_at ? Date.parse(b.updated_at) : NaN;
      var ca = a.created_at ? Date.parse(a.created_at) : NaN;
      var cb = b.created_at ? Date.parse(b.created_at) : NaN;
      var sa = !isNaN(ua) ? ua : ca;
      var sb2 = !isNaN(ub) ? ub : cb;
      if (!isNaN(sa) && !isNaN(sb2) && sa !== sb2) return sb2 - sa;
      return String(b.id || '').localeCompare(String(a.id || ''));
    });
  }

  function caseDateLabel(row) {
    var u = row.updated_at;
    var c = row.created_at;
    if (u && c && String(u) !== String(c)) {
      return escapeHtml(T('dash_updated')) + ' ' + escapeHtml(fmtDate(u));
    }
    return escapeHtml(T('dash_created')) + ' ' + escapeHtml(fmtDate(u || c));
  }

  function applyNav() {
    window.BK_SAT.init();
    document.getElementById('nav-home').href = window.BK_SAT.withLang('index.html');
    document.getElementById('nav-spec').href = window.BK_SAT.withLang('specialists-home.html');
    document.getElementById('nav-contact').href = window.BK_SAT.withLang('contact.html');
    document.getElementById('nav-home').textContent = T('nav_home');
    document.getElementById('nav-spec').textContent = T('nav_specialists');
    document.getElementById('nav-contact').textContent = T('nav_contact');
    document.getElementById('nav-dash').textContent = T('nav_dashboard');
    var nlo = document.getElementById('nav-logout');
    if (nlo) nlo.textContent = T('nav_logout');
    document.getElementById('share-h2').textContent = T('dash_share_title');
    document.getElementById('share-copy').textContent = T('dash_copy');
    document.getElementById('share-close').textContent = T('dash_close');
    document.getElementById('share-close').onclick = function () { document.getElementById('share-overlay').classList.remove('open'); };
    document.title = T('nav_dashboard') + ' — BusinessKlar';
    document.getElementById('el-login').textContent = T('dash_gate_title');
    document.getElementById('el-logd').textContent = T('dash_gate_intro');
    var epw = document.getElementById('el-pw');
    if (epw) epw.textContent = PW_LBL[window.BK_SAT.getLang()] || PW_LBL.en;
    document.getElementById('nav-dash').href = window.BK_SAT.withLang('dashboard.html');
  }

  function bindCaseListHandlers(list, u) {
    if (!list) return;
    list.querySelectorAll('.btn-open-dash').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-id');
        try { sessionStorage.setItem('bk_open_case_id', id); } catch (e) {}
        window.location.href = window.BK_SAT.withLang('index.html');
      });
    });
    list.querySelectorAll('.btn-pdf-dash').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-id');
        try {
          sessionStorage.setItem('bk_open_case_id', id);
          sessionStorage.setItem('bk_pdf_request', '1');
        } catch (e) {}
        window.location.href = window.BK_SAT.withLang('index.html');
      });
    });
    list.querySelectorAll('.btn-share').forEach(function (btn) {
      btn.addEventListener('click', async function () {
        var id = btn.getAttribute('data-id');
        var tok = await ensureTokenForCase(id, u.id);
        if (!tok) {
          dashToast(T('dash_share_fail'));
          return;
        }
        openShareDialog(shareUrlClean(tok));
      });
    });
    list.querySelectorAll('.btn-del').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-id');
        confirmDialog(T('dash_confirm_del_title'), async function () {
          var del = await sb.from('business_cases').delete().eq('id', id).eq('profile_id', u.id);
          if (del.error) {
            dashToast(T('dash_del_fail'));
            return;
          }
          var card = btn.closest('.card');
          if (card) card.remove();
          if (!list.querySelector('.card')) {
            list.innerHTML = '<div class="empty"><div class="empty-icon" aria-hidden="true">📊</div>' +
              '<strong style="color:var(--text);font-size:17px;display:block;margin-bottom:8px">' + escapeHtml(T('dash_empty_title')) + '</strong>' +
              escapeHtml(T('dash_empty_body')) +
              '<a href="' + escapeHtml(window.BK_SAT.withLang('index.html')) + '">' + escapeHtml(T('dash_empty_link')) + '</a></div>';
          }
        });
      });
    });
  }

  async function loadDashboardCases(u) {
    var list = document.getElementById('list');
    if (!list) return;
    list.innerHTML = '<div class="empty">' + escapeHtml(T('dash_loading')) + '</div>';
    var q = await sb.from('business_cases').select('*').eq('profile_id', u.id);
    if (q.error) {
      list.innerHTML = '<div class="empty">' + escapeHtml(T('dash_load_err')) + '</div>';
      return;
    }
    var rows = sortCases(q.data || []);
    if (!rows.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon" aria-hidden="true">📊</div>' +
        '<strong style="color:var(--text);font-size:17px;display:block;margin-bottom:8px">' + escapeHtml(T('dash_empty_title')) + '</strong>' +
        escapeHtml(T('dash_empty_body')) +
        '<a href="' + escapeHtml(window.BK_SAT.withLang('index.html')) + '">' + escapeHtml(T('dash_empty_link')) + '</a></div>';
      return;
    }
    list.innerHTML = rows.map(function (row) {
      var id = row.id;
      var title = caseTitle(row);
      var dtLine = caseDateLabel(row);
      var st = caseStatus(row);
      return '<div class="card" data-case-id="' + id + '">' +
        '<h3>' + escapeHtml(title) + '</h3>' +
        '<div class="meta">' + dtLine + '</div>' +
        '<div class="status-pill">' + escapeHtml(st) + '</div>' +
        '<div class="row-btns">' +
        '<button type="button" class="btn-open-dash" data-id="' + id + '">' + escapeHtml(T('dash_open')) + '</button>' +
        '<button type="button" class="btn-pdf-dash" data-id="' + id + '">' + escapeHtml(T('dash_pdf')) + '</button>' +
        '<button type="button" class="btn-share" data-id="' + id + '">' + escapeHtml(T('dash_share')) + '</button>' +
        '<button type="button" class="danger btn-del" data-id="' + id + '">' + escapeHtml(T('dash_delete')) + '</button>' +
        '</div></div>';
    }).join('');
    bindCaseListHandlers(list, u);
  }

  function renderAuthUI() {
    refreshPageAuthState();
  }
  function refreshPageAuthState() {
    if (typeof BK_AUTH === 'undefined') return;
    (async function () {
      var u = await BK_AUTH.getCurrentUser(sb);
      var main = document.getElementById('main');
      if (u && main && main.style.display !== 'none') {
        await loadDashboardCases(u);
      }
    })();
  }
  if (typeof BK_AUTH !== 'undefined') {
    window.addEventListener(BK_AUTH.EVENT_NAME, function (e) {
      var d = e.detail || {};
      if (d.event === 'TOKEN_REFRESHED') return;
      renderAuthUI();
    });
  }

  (async function () {
    applyNav();
    var loading = document.getElementById('dash-loading');
    var gate = document.getElementById('gate');
    var main = document.getElementById('main');
    var inner = document.getElementById('gate-inner');
    var list = document.getElementById('list');
    try {
    if (loading) {
      loading.textContent = T('dash_loading');
      loading.style.display = 'block';
    }
    var u = (await sb.auth.getUser()).data.user;
    if (loading) loading.style.display = 'none';
    if (!u) {
      if (gate) gate.style.display = 'block';
      if (main) main.style.display = 'none';
      if (inner) {
        inner.innerHTML = '<h1 style="color:var(--gold);font-size:1.2rem;margin-bottom:12px">' + escapeHtml(T('dash_gate_title')) + '</h1>' +
          '<p style="color:var(--muted);font-size:14px;margin-bottom:18px;line-height:1.5">' + escapeHtml(T('dash_gate_intro')) + '</p>' +
          '<button type="button" class="empty a" style="border:none;cursor:pointer;font-family:inherit" id="btn-open-auth">' + escapeHtml(T('authlogin')) + ' / ' + escapeHtml(T('authreg')) + '</button>' +
          '<p style="margin-top:16px;font-size:13px;color:var(--muted)"><a href="' + escapeHtml(window.BK_SAT.withLang('index.html')) + '" style="color:var(--gold)">' + escapeHtml(T('dash_gate_link')) + '</a></p>';
        var boa = document.getElementById('btn-open-auth');
        if (boa) boa.onclick = function () {
          document.getElementById('auth-modal').classList.remove('hidden');
          if (typeof window.BK_AUTH_SET_MODE === 'function') window.BK_AUTH_SET_MODE(window._bkAuthMode || 'login');
        };
      }
      if (typeof window.BK_AUTH !== 'undefined') {
        window.BK_AUTH.bindAuthModal({ sb: sb, tx: T, mode: 'dashboard' });
      }
      return;
    }
    if (gate) gate.style.display = 'none';
    if (main) main.style.display = 'block';
    var nloBtn = document.getElementById('nav-logout');
    if (nloBtn) {
      nloBtn.style.display = 'inline-flex';
      nloBtn.onclick = async function () {
        try {
          if (typeof BK_AUTH !== 'undefined') await BK_AUTH.logout(sb);
          else await sb.auth.signOut({ scope: 'global' });
        } catch (e) {}
        window.location.href = window.BK_SAT.withLang('index.html');
      };
    }
    var wEl = document.getElementById('welcome');
    var wsEl = document.getElementById('welcome-sub');
    if (wEl) wEl.textContent = T('dash_hello') + (u.email ? ', ' + u.email.split('@')[0] : '');
    if (wsEl) wsEl.textContent = T('dash_welcome_sub');

    await loadDashboardCases(u);
    } catch (e) {
      if (gate) gate.style.display = 'block';
      if (main) main.style.display = 'none';
      if (inner) {
        inner.innerHTML = '<h1 style="color:var(--gold);font-size:1.2rem;margin-bottom:12px">' + escapeHtml(T('dash_err_title')) + '</h1>' +
          '<p>' + escapeHtml(T('dash_err_text')) + '</p>' +
          '<a href="' + escapeHtml(window.BK_SAT.withLang('index.html')) + '">' + escapeHtml(T('dash_gate_link')) + '</a>';
      }
    }
  })();

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  </script>
</body>
</html>
